<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>데일리 밴드 V7.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg-color: #f5f7fb; --surface-color: #ffffff; --primary-color: #222222;
            --accent-color: #ff3b30; --brand-blue: #007aff; --brand-green: #34c759;
            --brand-yellow: #fff3bf; --brand-yellow-border: #fab005; --text-color: #2d3142;
            --text-muted: #8c92ac; --border-color: #e4e9f2;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-color); overflow: hidden; height: 100vh; }
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s ease; }
        #splash-screen.fade-out { opacity: 0; pointer-events: none; }
        .logo-animation { width: 100px; height: 100px; border: 4px solid var(--brand-blue); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 38px; animation: pulse 1.5s infinite alternate; }
        @keyframes pulse { 0% { transform: scale(0.95); } 100% { transform: scale(1.05); } }
        .splash-title { margin-top: 20px; font-size: 20px; font-weight: 700; letter-spacing: 4px; color: var(--brand-blue); }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); display: flex; flex-direction: column; justify-content: center; padding: 25px; z-index: 9998; }
        #login-screen.hidden { display: none; }
        .login-box { background: var(--surface-color); padding: 50px 25px; border-radius: 24px; border: 1px solid var(--border-color); text-align: center; box-shadow: 0 10px 30px rgba(140,146,172,0.15); }
        .login-box h2 { margin-bottom: 30px; font-size: 26px; font-weight: 700; color: var(--brand-blue); }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px 16px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #dbe2ef; background: #f9fbfd; font-size: 14px; outline: none; }
        .btn-submit { width: 100%; padding: 15px; border: none; border-radius: 14px; background: linear-gradient(135deg, var(--brand-blue), #0056b3); color: #fff; font-weight: 700; font-size: 16px; cursor: pointer; }
        #app-container { display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--surface-color); padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        header h1 { font-size: 18px; font-weight: 700; color: var(--brand-blue); }
        .header-right { display: flex; align-items: center; gap: 10px; }
        .role-badge { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; background: #edf2f9; color: #4f5e7b; }
        .btn-logout { background: none; border: none; color: var(--text-muted); cursor: pointer; }
        main { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 95px; }
        .page { display: none; } .page.active { display: block; }
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--surface-color); border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; padding: 12px 0; z-index: 900; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 10px; cursor: pointer; gap: 4px; }
        .nav-item.active { color: var(--brand-blue); }
        .card { background: var(--surface-color); border-radius: 20px; padding: 18px; margin-bottom: 16px; border: 1px solid var(--border-color); box-shadow: 0 4px 12 rgba(0,0,0,0.02); }
        .chat-container { display: flex; flex-direction: column; height: calc(100vh - 165px); }
        .voicetalk-bar { background: #e6ffed; border: 1px solid #bbf7d0; padding: 10px 14px; border-radius: 14px; font-size: 12.5px; display: none; align-items: center; justify-content: space-between; margin-bottom: 8px; color: #15803d; font-weight: bold; }
        .vt-pulse { width: 8px; height: 8px; background: var(--brand-green); border-radius: 50%; animation: vtPulse 1s infinite alternate; }
        .vt-pulse.muted { background: var(--accent-color) !important; animation: none; }
        @keyframes vtPulse { from { transform: scale(0.8); opacity: 0.5; } to { transform: scale(1.2); opacity: 1; } }
        .mic-meter-container { width: 60px; height: 6px; background: #d1fae5; border-radius: 3px; overflow: hidden; }
        .mic-meter-bar { width: 0%; height: 100%; background: var(--brand-green); transition: width 0.1s ease; }
        .chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .chat-bubble-row { display: flex; flex-direction: column; max-width: 85%; }
        .chat-bubble-row.mine { align-self: flex-end; align-items: flex-end; }
        .chat-bubble-row.other { align-self: flex-start; align-items: flex-start; }
        .chat-bubble { padding: 10px 14px; border-radius: 16px; font-size: 13.5px; }
        .chat-bubble.mine { background: var(--brand-blue); color: #fff; border-bottom-right-radius: 2px; }
        .chat-bubble.other { background: #ffffff; border: 1px solid var(--border-color); border-bottom-left-radius: 2px; }
        .chat-input-area { display: flex; gap: 8px; padding-top: 10px; }
        .chat-input-area input { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #dbe2ef; }
        .btn-action { background: var(--brand-blue); color: #fff; border: none; padding: 10px 16px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 4px; font-weight: bold;}
    </style>
</head>
<body>

    <div id="splash-screen"><div class="logo-animation">🥁</div><div class="splash-title">DAILY BAND</div></div>
    <div id="login-screen" class="hidden">
        <div class="login-box">
            <h2>DAILY BAND</h2>
            <input type="text" id="login-id" placeholder="아이디">
            <input type="password" id="login-pw" placeholder="비밀번호">
            <button class="btn-submit" onclick="handleLogin()">로그인</button>
        </div>
    </div>

    <div id="app-container">
        <header>
            <h1>DAILY BAND</h1>
            <div class="header-right"><div id="user-tag" class="role-badge">조회중...</div><button class="btn-logout" onclick="handleLogout()"><span class="material-icons">logout</span></button></div>
        </header>
        <main>
            <section id="page-feed" class="page active"><div class="card"><h3>📢 데일리 밴드 보이스톡 전용판</h3><p style="font-size:13px; color:var(--text-muted); margin-top:5px;">24시간 잠들지 않는 무전기 시스템 가동 중</p></div></section>
            <section id="page-chat" class="page">
                <div class="chat-container">
                    <div style="display:flex; justify-content:flex-end; margin-bottom:8px;">
                        <button class="btn-action" style="background:var(--brand-green);" onclick="startVoiceTalk()"><span class="material-icons" style="font-size:16px;">phone</span> 보이스톡 켜기</button>
                    </div>
                    <div class="voicetalk-bar" id="voicetalk-active-bar">
                        <div style="display:flex; align-items:center; gap:8px;"><div class="vt-pulse" id="vt-pulse-indicator"></div><span>통화 중 (<span id="vt-timer">00:00</span>)</span></div>
                        <div style="display:flex; align-items:center; gap:6px;">
                            <button class="btn-action" id="btn-mic-mute" style="background:#4a5568; padding:4px 8px; font-size:11px;" onclick="toggleMicMute()"><span class="material-icons" id="icon-mute-state" style="font-size:14px;">mic</span><span id="text-mute-state">음소거</span></button>
                            <div class="mic-meter-container"><div class="mic-meter-bar" id="mic-bar"></div></div>
                            <button class="btn-action" style="background:var(--accent-color); padding:4px 8px; font-size:11px;" onclick="stopVoiceTalk()">종료</button>
                        </div>
                    </div>
                    <div class="chat-messages" id="chat-box"></div>
                    <div class="chat-input-area">
                        <input type="text" id="chat-input" placeholder="메시지 입력..." onkeypress="if(event.key==='Enter') sendChat()">
                        <button class="btn-action" onclick="sendChat()">전송</button>
                    </div>
                </div>
            </section>
        </main>
        <nav>
            <div class="nav-item active" onclick="switchPage('feed')"><span class="material-icons">dashboard</span>홈피드</div>
            <div class="nav-item" onclick="switchPage('chat')"><span class="material-icons">forum</span>대화방</div>
        </nav>
    </div>

    <script>
        let usersDB = {
            "ohminseung": { pw: "minmom!23", name: "오민승", part: "기타 솔로" },
            "drummer": { pw: "1234", name: "김드럼", part: "드럼 세션" },
            "bassist": { pw: "1234", name: "이지원", part: "베이스 세션" }
        };
        let currentUser = JSON.parse(localStorage.getItem('db_logged_user_v7.5')) || null;
        let chats = [{ senderId: "system", senderName: "운영진", text: "실시간 무전기 통화판 가동 완료 ⚡" }];

        let socket = io();
        let localStream = null; let peerConnections = {}; let isMuted = false;
        const targetRoomId = "daily_band_main_room";
        const rtcConfig = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };
        let audioContext = null, analyser = null, javascriptNode = null;
        let talkTimerInterval = null, talkSeconds = 0;

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('splash-screen').classList.add('fade-out');
                if (currentUser && usersDB[currentUser.id]) { applyAuthentication(); } 
                else { document.getElementById('login-screen').classList.remove('hidden'); }
            }, 1000);
        });

        function handleLogin() {
            const idVal = document.getElementById('login-id').value.trim();
            const pwVal = document.getElementById('login-pw').value.trim();
            if(usersDB[idVal] && usersDB[idVal].pw === pwVal) {
                currentUser = { id: idVal, ...usersDB[idVal] };
                localStorage.setItem('db_logged_user_v7.5', JSON.stringify(currentUser));
                document.getElementById('login-screen').classList.add('hidden');
                applyAuthentication();
            } else { alert("로그인 정보 오류"); }
        }

        function handleLogout() { localStorage.removeItem('db_logged_user_v7.5'); location.reload(); }
        function applyAuthentication() {
            document.getElementById('user-tag').textContent = `${currentUser.name} (${currentUser.part})`;
            renderChats();
        }
        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`page-${pageId}`).classList.add('active');
            event.currentTarget.classList.add('active');
            if(pageId === 'chat') scrollChatBottom();
        }

        function startVoiceTalk() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return alert("마이크 미지원 환경");
            navigator.mediaDevices.getUserMedia({ audio: true, video: false }).then(stream => {
                localStream = stream; isMuted = false; updateMuteUI();
                document.getElementById('voicetalk-active-bar').style.display = 'flex';
                initMicMeter(stream); startTimer();
                socket.emit('join-voicetalk', targetRoomId);
            }).catch(err => alert("마이크 권한 거부됨"));
        }

        function toggleMicMute() {
            if (!localStream) return; isMuted = !isMuted;
            localStream.getAudioTracks().forEach(t => t.enabled = !isMuted); updateMuteUI();
        }
        function updateMuteUI() {
            const btn = document.getElementById('btn-mic-mute'); const ic = document.getElementById('icon-mute-state');
            const txt = document.getElementById('text-mute-state'); const pulse = document.getElementById('vt-pulse-indicator');
            if (isMuted) { btn.style.background = "var(--accent-color)"; ic.textContent = "mic_off"; txt.textContent = "차단됨"; pulse.classList.add('muted'); document.getElementById('mic-bar').style.width = "0%"; } 
            else { btn.style.background = "#4a5568"; ic.textContent = "mic"; txt.textContent = "음소거"; pulse.classList.remove('muted'); }
        }

        socket.on('user-connected', id => {
            initPC(id); localStream.getTracks().forEach(t => peerConnections[id].addTrack(t, localStream));
            peerConnections[id].createOffer().then(s => peerConnections[id].setLocalDescription(s)).then(() => {
                socket.emit('offer', { sdp: peerConnections[id].localDescription, roomId: targetRoomId });
            });
        });
        socket.on('offer', data => {
            initPC(data.sender); if (localStream) localStream.getTracks().forEach(t => peerConnections[data.sender].addTrack(t, localStream));
            peerConnections[data.sender].setRemoteDescription(new RTCSessionDescription(data.sdp)).then(() => peerConnections[data.sender].createAnswer()).then(s => peerConnections[data.sender].setLocalDescription(s)).then(() => {
                socket.emit('answer', { sdp: peerConnections[data.sender].localDescription, roomId: targetRoomId });
            });
        });
        socket.on('answer', data => peerConnections[data.sender].setRemoteDescription(new RTCSessionDescription(data.sdp)));
        socket.on('ice-candidate', data => { if(peerConnections[data.sender]) peerConnections[data.sender].addIceCandidate(new RTCIceCandidate(data.candidate)); });

        function initPC(id) {
            if (peerConnections[id]) return;
            let pc = new RTCPeerConnection(rtcConfig); peerConnections[id] = pc;
            pc.onicecandidate = e => { if (e.candidate) socket.emit('ice-candidate', { candidate: e.candidate, roomId: targetRoomId }); };
            pc.ontrack = e => { let audio = document.createElement('audio'); audio.srcObject = e.streams[0]; audio.autoplay = true; document.body.appendChild(audio); };
        }
        function stopVoiceTalk() {
            if(talkTimerInterval) clearInterval(talkTimerInterval); if(javascriptNode) clearInterval(javascriptNode);
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            Object.keys(peerConnections).forEach(id => peerConnections[id].close()); peerConnections = {};
            document.getElementById('voicetalk-active-bar').style.display = 'none'; document.getElementById('mic-bar').style.width = "0%";
        }
        function initMicMeter(stream) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)(); analyser = audioContext.createAnalyser();
            audioContext.createMediaStreamSource(stream).connect(analyser); analyser.fftSize = 256;
            let arr = new Uint8Array(analyser.frequencyBinCount);
            javascriptNode = setInterval(() => {
                if(isMuted) return; analyser.getByteFrequencyData(arr);
                let sum = arr.reduce((a,b) => a+b, 0);
                document.getElementById('mic-bar').style.width = Math.min(100, Math.floor((sum/arr.length/128)*100)) + "%";
            }, 50);
        }
        function startTimer() {
            talkSeconds = 0; talkTimerInterval = setInterval(() => { talkSeconds++;
                document.getElementById('vt-timer').textContent = `${Math.floor(talkSeconds/60).toString().padStart(2,'0')}:${(talkSeconds%60).toString().padStart(2,'0')}`;
            }, 1000);
        }
        function renderChats() {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            chats.forEach(c => {
                const isMine = c.senderId === currentUser?.id;
                const row = document.createElement('div'); row.className = `chat-bubble-row ${isMine?'mine':'other'}`;
                row.innerHTML = `<div class="chat-bubble ${isMine?'mine':'other'}">${c.text}</div>`;
                box.appendChild(row);
            });
            scrollChatBottom();
        }
        function sendChat() {
            const inp = document.getElementById('chat-input'); if(!inp.value.trim()) return;
            chats.push({ senderId: currentUser.id, text: inp.value.trim() }); renderChats(); inp.value = "";
        }
        function scrollChatBottom() { const box = document.getElementById('chat-box'); box.scrollTop = box.scrollHeight; }
    </script>
</body>
</html>
