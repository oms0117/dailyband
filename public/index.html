<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Daily Band</title>
    </head>
<body>

    <script>
        // 기존 LocalStorage 및 currentUser 변수 라인 100% 유지
        let currentUser = { id: "admin", name: "부장대장", role: "관리자", part: "기타" };
        
        let usersDB = JSON.parse(localStorage.getItem('db_users_v7')) || {
            "admin": { pw: "1234", name: "부장대장", role: "관리자", part: "기타" },
            "drum_king": { pw: "1111", name: "김드럼", role: "부원", part: "드럼" },
            "vocal_queen": { pw: "2222", name: "이보컬", role: "부원", part: "보컬" }
        };
        
        let chats = JSON.parse(localStorage.getItem('db_chats_v7')) || [];
        let calendarEvents = JSON.parse(localStorage.getItem('db_events_v7')) || [];
        let freeDayVotes = JSON.parse(localStorage.getItem('db_free_votes_v7')) || {};
        let feeds = JSON.parse(localStorage.getItem('db_feeds_v7')) || [];
        let votes = JSON.parse(localStorage.getItem('db_votes_v7')) || [];
        let pinnedChatText = localStorage.getItem('db_pinned_chat_v7') || "📢 상단 고정 공지사항이 비어있습니다.";

        // ... (중략: 원래 있던 WebRTC, 소켓 에뮬레이터, 타이머, 게이지 함수들 절대 수정 안 함) ...

        // 1. [기능 유지] 마이크 진짜 소리 감지용 게이지 트래커 익스프레션
        function startMicGaugeMeter(stream) {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                let source = audioContext.createMediaStreamSource(stream);
                source.connect(analyser);
                analyser.fftSize = 256;
                let bufferLength = analyser.frequencyBinCount;
                let dataArray = new Uint8Array(bufferLength);
                javascriptNode = setInterval(() => {
                    if (!analyser) return;
                    analyser.getByteFrequencyData(dataArray);
                    let total = 0;
                    for(let i=0; i<bufferLength; i++) { total += dataArray[i]; }
                    let volume = total / bufferLength;
                    let barPercent = Math.min(100, Math.floor((volume / 128) * 100));
                    document.getElementById('mic-bar').style.width = barPercent + "%";
                }, 50);
            } catch(e) { console.error("오디오 시각화 노드 에러:", e); }
        }

        // 2. [기능 유지] 페이지 스위칭 함수
        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`page-${pageId}`).classList.add('active');
            event.currentTarget.classList.add('active');
            if(pageId === 'feed') document.getElementById('global-fab').style.display = 'flex';
            else document.getElementById('global-fab').style.display = 'none';
            if(pageId === 'chat') scrollChatBottom();
        }

        // 3. [기능 유지] 공지사항 업데이트 및 철거 로직
        function updateGlobalNotice() {
            const val = document.getElementById('adm-notice-input').value.trim();
            if(!val) return alert("공지할 문구를 입력하세요.");
            pinnedChatText = val;
            localStorage.setItem('db_pinned_chat_v7', pinnedChatText);
            document.getElementById('pinned-notice-text').textContent = pinnedChatText;
            alert("대화방 상단 고정 공지가 실시간으로 전송 교체되었습니다.");
        }

        function deleteGlobalNotice() {
            if(!confirm("상단 공지사항을 내리시겠습니까?")) return;
            pinnedChatText = "📢 상단 고정 공지사항이 비어있습니다.";
            localStorage.setItem('db_pinned_chat_v7', pinnedChatText);
            document.getElementById('pinned-notice-text').textContent = pinnedChatText;
            document.getElementById('adm-notice-input').value = "";
            alert("공지가 철거되었습니다.");
        }

        // 4. [원래 코드 유지 + 일정 삭제 버튼 연동] 달력 및 스케줄 뷰어
        function renderCalendar() {
            const grid = document.getElementById('calendar-grid'); grid.innerHTML = "";
            ['일','월','화','수','목','금','토'].forEach(l => {
                const lbl = document.createElement('div'); lbl.className = "calendar-day-label"; lbl.textContent = l; grid.appendChild(lbl);
            });
            for(let i=0; i<5; i++) grid.appendChild(document.createElement('div'));

            for(let d=1; d<=31; d++) {
                const dayDiv = document.createElement('div'); dayDiv.className = "calendar-day";
                const dateStr = `2026-05-${d < 10 ? '0' + d : d}`;
                const numSpan = document.createElement('span'); numSpan.textContent = d; dayDiv.appendChild(numSpan);

                const ev = calendarEvents.find(e => e.date === dateStr);
                if(ev) {
                    dayDiv.classList.add('has-official-event');
                    const tag = document.createElement('div'); tag.className = "official-badge-inline"; tag.textContent = "⚡ 합주"; dayDiv.appendChild(tag);
                    if(ev.absentees && ev.absentees.length > 0) {
                        const absTag = document.createElement('div');
                        absTag.className = "absent-list-inline";
                        absTag.textContent = `불참:${ev.absentees.join(',')}`;
                        dayDiv.appendChild(absTag);
                    }
                } else {
                    const dayVoters = freeDayVotes[dateStr] || [];
                    if(dayVoters.length > 0) {
                        const inlineList = document.createElement('div'); inlineList.className = "calendar-voters-inline";
                        inlineList.textContent = dayVoters.join(','); dayDiv.appendChild(inlineList);
                    }
                }
                dayDiv.onclick = () => {
                    document.querySelectorAll('.calendar-day').forEach(el => el.classList.remove('selected'));
                    dayDiv.classList.add('selected'); showSelectedDateEvents(dateStr);
                };
                grid.appendChild(dayDiv);
            }
        }

        function showSelectedDateEvents(dateStr) {
            const container = document.getElementById('selected-date-events');
            container.innerHTML = `<div style="font-weight:700; font-size:13px; margin-bottom:10px; color:var(--brand-blue); border-bottom:1px solid var(--border-color); padding-bottom:4px;">📍 ${dateStr} 합주 세션 조율현황</div>`;
            
            const matched = calendarEvents.filter(e => e.date === dateStr);
            const freeVoters = freeDayVotes[dateStr] || [];

            if(matched.length === 0) {
                container.innerHTML += `
                    <div class="free-voters-box">
                        <div style="font-weight:700; font-size:12px; margin-bottom:4px;">🙋 참여 가능 선언 멤버</div>
                        <div style="color:var(--brand-blue); font-weight:700; font-size:13px; margin-bottom:8px;">${freeVoters.join(', ') || '가능 인원 없음'}</div>
                        <button class="btn-action" style="font-size:12px; width:100%; justify-content:center; background:#fff;" onclick="voteFreeDay('${dateStr}')">👍 내 스케줄 가능여부 변경</button>
                    </div>
                `;
            } else {
                matched.forEach(ev => {
                    if(!ev.absentees) ev.absentees = [];
                    const isAttending = ev.attendees.includes(currentUser.name);
                    const isAbsenting = ev.absentees.includes(currentUser.name);
                    
                    // 🆕 [추가 기능] 관리자일 때만 한 개씩 지우는 '일정 삭제' 버튼 추가
                    const deleteEventBtn = (currentUser.role === '관리자' || currentUser.role === '부장')
                        ? `<button class="btn-action" style="background:#ff4d4f; color:#fff; font-size:11px; margin-top:6px; width:100%; justify-content:center;" onclick="deleteCalendarEvent(${ev.id}, '${dateStr}')">🗑️ 이 일정 삭제</button>`
                        : '';
                    
                    container.innerHTML += `
                        <div style="background:#fffdb5; padding:12px; border-radius:12px; border:1px solid var(--brand-yellow-border);">
                            <div style="font-weight:700; font-size:14px;">${ev.title}</div>
                            <div style="font-size:12px; margin:4px 0;">⏰ 시간: ${ev.time}</div>
                            <div style="background:#fff; padding:6px; border-radius:6px; font-size:12px; border:1px solid #e4e9f2; margin-bottom:4px;">참석 확정: <b style="color:var(--brand-blue);">${ev.attendees.join(', ') || '없음'}</b></div>
                            <div style="background:#fff; padding:6px; border-radius:6px; font-size:12px; border:1px solid #e4e9f2; margin-bottom:8px;">불참 통보: <b style="color:var(--brand-green);">${ev.absentees.join(', ') || '없음'}</b></div>
                            <div style="display:flex; gap:6px;">
                                <button class="btn-action" style="flex:1; justify-content:center; background:${isAttending?'var(--brand-blue)':'#fff'}; color:${isAttending?'#fff':''};" onclick="declareAttendance(${ev.id}, true)">🙋 참전 확정</button>
                                <button class="btn-action" style="flex:1; justify-content:center; background:${isAbsenting?'var(--brand-green)':'#fff'}; color:${isAbsenting?'#fff':''};" onclick="declareAttendance(${ev.id}, false)">❌ 불참 선언</button>
                            </div>
                            ${deleteEventBtn}
                        </div>
                    `;
                });
            }
        }

        // 🆕 [새 함수 추가] 정식 일정 개별 삭제 로직
        function deleteCalendarEvent(eventId, dateStr) {
            if(!confirm("이 일정을 삭제하시겠습니까?")) return;
            calendarEvents = calendarEvents.filter(e => e.id !== eventId);
            localStorage.setItem('db_events_v7', JSON.stringify(calendarEvents));
            renderCalendar();
            showSelectedDateEvents(dateStr);
        }

        function declareAttendance(eventId, attending) {
            const ev = calendarEvents.find(e => e.id === eventId); if(!ev) return;
            if(!ev.absentees) ev.absentees = [];
            ev.attendees = ev.attendees.filter(name => name !== currentUser.name);
            ev.absentees = ev.absentees.filter(name => name !== currentUser.name);
            if(attending) { ev.attendees.push(currentUser.name); } 
            else { ev.absentees.push(currentUser.name); }
            localStorage.setItem('db_events_v7', JSON.stringify(calendarEvents));
            renderCalendar(); showSelectedDateEvents(ev.date);
        }

        function voteFreeDay(dateStr) {
            if(!freeDayVotes[dateStr]) freeDayVotes[dateStr] = [];
            const idx = freeDayVotes[dateStr].indexOf(currentUser.name);
            if(idx > -1) freeDayVotes[dateStr].splice(idx, 1);
            else freeDayVotes[dateStr].push(currentUser.name);
            localStorage.setItem('db_free_votes_v7', JSON.stringify(freeDayVotes));
            renderCalendar(); showSelectedDateEvents(dateStr);
        }

        function addCalendarEvent() {
            const title = document.getElementById('event-title').value.trim();
            const date = document.getElementById('event-date').value;
            const time = document.getElementById('event-time').value.trim();
            if(!title || !date || !time) return;
            calendarEvents.push({ id: Date.now(), date, title, time, attendees: [currentUser.name], absentees: [] });
            localStorage.setItem('db_events_v7', JSON.stringify(calendarEvents));
            renderCalendar(); showSelectedDateEvents(date);
        }

        // ... (중략: 원래 있던 메신저 룸 코어 렌더러, 채팅 전송 함수 100% 동일하게 유지) ...

        // 5. [원래 코드 유지 + 곡 삭제 버튼 연동] 선곡 투표 뷰어
        function renderVotes() {
            const list = document.getElementById('vote-list'); list.innerHTML = "";
            votes.forEach((item, index) => {
                const itemDiv = document.createElement('div'); itemDiv.className = "vote-item";
                
                // 🆕 [추가 기능] 한 개씩 지우는 곡 삭제 버튼 주입
                const deleteSongBtn = (currentUser.role === '관리자' || currentUser.role === '부장')
                    ? `<button onclick="deleteSongByIndex(${index})" style="background:#ff4d4f; color:#fff; border:none; padding:2px 6px; border-radius:4px; font-size:11px; cursor:pointer; margin-left:10px;">삭제</button>`
                    : '';

                itemDiv.innerHTML = `
                    <div class="vote-info">
                        <h4>${item.title} ${deleteSongBtn}</h4>
                        <p>${item.artist}</p>
                    </div>
                `;
                list.appendChild(itemDiv);
            });
        }

        // 🆕 [새 함수 추가] 단일 곡 인덱스 삭제 로직
        function deleteSongByIndex(index) {
            if(!confirm(`[${votes[index].title}] 곡을 후보에서 삭제하시겠습니까?`)) return;
            votes.splice(index, 1);
            localStorage.setItem('db_votes_v7', JSON.stringify(votes));
            renderVotes();
        }

        function updateMyProfile() {
            const p = document.getElementById('mp-part').value.trim();
            const pw = document.getElementById('mp-pw').value.trim();
            usersDB[currentUser.id].part = p; usersDB[currentUser.id].pw = pw;
            localStorage.setItem('db_users_v7', JSON.stringify(usersDB));
            alert("프로필 정보 동기화 완료"); applyAuthentication();
        }

        function createUserByAdmin() {
            const id = document.getElementById('adm-new-id').value.trim();
            const pw = document.getElementById('adm-new-pw').value.trim();
            const name = document.getElementById('adm-new-name').value.trim();
            if(!id || !pw || !name) return alert("빈칸 유실");
            usersDB[id] = { pw: pw, name: name, role: "부원", part: "미정 세션" };
            localStorage.setItem('db_users_v7', JSON.stringify(usersDB));
            alert("부원 계정이 발급되었습니다."); renderAdminBackoffice(); renderChats();
        }

        // 6. [👑 핵심 수정] 원래 코드의 테이블 구조를 유지하면서 인풋 상자로 직접 입력 및 수정/삭제되게 변경
        function renderAdminBackoffice() {
            const tbody = document.getElementById('admin-user-log'); if(!tbody) return; tbody.innerHTML = "";
            Object.keys(usersDB).forEach(id => {
                const u = usersDB[id]; const tr = document.createElement('tr');
                const isMe = (id === currentUser.id);
                
                // 본인 계정은 삭제 불가 처리
                const deleteAction = isMe 
                    ? `<span style="color:#aaa;">(본인)</span>` 
                    : `<button onclick="deleteUserInline('${id}')" style="background:#ff4d4f; color:#fff; border:none; padding:2px 6px; border-radius:4px; font-size:11px; cursor:pointer;">삭제</button>`;

                // 원래 <td> 구조에 prompt 팝업 대신 value 값을 수정할 수 있는 <input> 다이렉트 주입
                tr.innerHTML = `
                    <td><input type="text" id="edit-name-${id}" value="${u.name}" style="width:70px; text-align:center;"></td>
                    <td><span>${id}</span></td>
                    <td><input type="text" id="edit-pw-${id}" value="${u.pw}" style="width:70px; text-align:center;"></td>
                    <td><input type="text" id="edit-part-${id}" value="${u.part || '미정'}" style="width:80px; text-align:center;"></td>
                    <td>
                        <button onclick="saveUserInline('${id}')" style="background:var(--brand-blue, #3366ff); color:#fff; border:none; padding:2px 6px; border-radius:4px; font-size:11px; cursor:pointer; margin-right:2px;">저장</button>
                        ${deleteAction}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 🆕 [새 함수 추가] 테이블 안에서 타이핑한 정보 그대로 저장하는 전체수정 함수
        function saveUserInline(id) {
            const newName = document.getElementById(`edit-name-${id}`).value.trim();
            const newPw = document.getElementById(`edit-pw-${id}`).value.trim();
            const newPart = document.getElementById(`edit-part-${id}`).value.trim();

            if(!newName || !newPw || !newPart) return alert("빈칸이 있으면 저장할 수 없습니다.");

            usersDB[id].name = newName;
            usersDB[id].pw = newPw;
            usersDB[id].part = newPart;

            localStorage.setItem('db_users_v7', JSON.stringify(usersDB));
            alert("부원 정보가 필드에서 즉시 수정되었습니다.");

            if(id === currentUser.id) {
                currentUser.name = newName;
                currentUser.part = newPart;
            }
            renderAdminBackoffice();
            renderChats();
        }

        // 🆕 [새 함수 추가] 테이블 행에서 즉시 삭제하는 함수
        function deleteUserInline(id) {
            if(!confirm(`[${usersDB[id].name}] 부원의 계정을 삭제하시겠습니까?`)) return;
            delete usersDB[id];
            localStorage.setItem('db_users_v7', JSON.stringify(usersDB));
            renderAdminBackoffice();
            renderChats();
        }
    </script>
</body>
</html>
